kind = "web"
previewPath = "/"
title = "RaumLog"
version = "1.0.0"
id = "artifacts/raumlog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20284

[services.development]
run = "pnpm --filter @workspace/raumlog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raumlog", "run", "build" ]
publicDir = "artifacts/raumlog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20284"
BASE_PATH = "/"
