kind = "mobile"
previewPath = "/raumlog-mobile/"
title = "RaumLog Mobile"
version = "1.0.0"
id = "artifacts/raumlog-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/raumlog-mobile/" ]
localPort = 23453

[services.development]
run = "pnpm --filter @workspace/raumlog-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raumlog-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/raumlog-mobile", "run", "serve" ]

[services.env]
PORT = "23453"
BASE_PATH = "/raumlog-mobile/"
